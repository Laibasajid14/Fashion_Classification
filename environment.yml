name: fashion_cv
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10

  # PyTorch — CUDA 11.8 build (T4 GPU on Kaggle)
  - pytorch=2.1.0
  - torchvision=0.16.0
  - pytorch-cuda=11.8

  # Core scientific stack
  - numpy=1.24.*
  - pandas=2.0.*
  - scikit-learn=1.3.*
  - matplotlib=3.7.*
  - seaborn=0.12.*
  - pillow=10.*

  # UI
  - pip

  - pip:
    - gradio>=4.7.0
    - tqdm>=4.65.0

# ── Notes ──────────────────────────────────────────────────────────────────────
# Kaggle T4 environment already has PyTorch + CUDA; install pip deps only:
#   pip install gradio tqdm scikit-learn seaborn
#
# Local install:
#   conda env create -f environment.yml
#   conda activate fashion_cv
